; BambuHelper - Bambu Lab Printer Monitor
; Supports ESP32-S3 Super Mini, ESP32-2432S028 (CYD), ESP32-C3 Super Mini,
; Waveshare ESP32-S3-Touch-LCD-2 / -1.54, Guition JC3248W535

; --- Shared library dependencies ---
[common]
lib_deps =
    lovyan03/LovyanGFX@^1.2.19
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

; =============================================================================
;  ESP32-S3 Super Mini + ST7789 240x240
; =============================================================================
[env:esp32s3]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32s3\"
    -D BOARD_IS_S3=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=13
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1

; =============================================================================
;  ESP32-2432S028 (CYD - Cheap Yellow Display) + ILI9341 240x320
;  Two hardware variants exist (ILI9341 vs ILI9341_2). Panel selection is
;  handled at runtime via the "Alternative CYD panel" checkbox in Settings.
; =============================================================================
[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 230400
board_build.partitions = min_spiffs.csv
lib_deps =
    ${common.lib_deps}
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
build_flags =
    ; --- CYD touch (XPT2046 on separate SPI bus) ---
    -D USE_XPT2046=1
    -D TOUCH_CS=33
    -D TOUCH_IRQ=36
    -D TOUCH_MOSI=32
    -D TOUCH_MISO=39
    -D TOUCH_CLK=25
    -D SPI_TOUCH_FREQUENCY=2500000
    ; --- Layout profile ---
    -D DISPLAY_CYD=1
    -D DISPLAY_240x320=1
    -D BOARD_VARIANT=\"cyd\"
    -D ENABLE_OTA_AUTO=1
    -D BOARD_LOW_RAM=1
    -D BACKLIGHT_PIN=21

; =============================================================================
;  Waveshare ESP32-S3-Touch-LCD-2 (2.0" ST7789 240x320)
;  https://www.waveshare.com/esp32-s3-touch-lcd-2.htm
; =============================================================================
[env:ws_lcd_200]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"ws_lcd_200\"
    -D BOARD_IS_WS200=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=1
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Layout profile (same 240x320 as CYD) ---
    -D DISPLAY_240x320=1
    ; --- Touch (CST816D on I2C) ---
    -D USE_CST816=1
    -D CST816_SDA=48
    -D CST816_SCL=47

; =============================================================================
;  Waveshare ESP32-S3-Touch-LCD-1.54 (1.54" ST7789 240x240)
;  https://docs.waveshare.net/ESP32-S3-Touch-LCD-1.54/
; =============================================================================
[env:ws_lcd_154]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"ws_lcd_154\"
    -D BOARD_IS_WS154=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=46
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Battery power-hold (AXP2101) ---
    -D BAT_EN=2
    ; --- Built-in buttons (from Waveshare button example) ---
    -D BOARD_BTN_1=0
    -D BOARD_BTN_2=5
    -D BOARD_BTN_3=4
    ; --- Built-in speaker (ES8311 codec + I2S + PA) ---
    -D BOARD_HAS_ES8311_AUDIO=1
    -D AUDIO_I2C_ADDR=0x18
    -D AUDIO_I2C_SDA=42
    -D AUDIO_I2C_SCL=41
    -D AUDIO_I2S_PORT=0
    -D AUDIO_I2S_MCLK=8
    -D AUDIO_I2S_BCLK=9
    -D AUDIO_I2S_LRC=10
    -D AUDIO_I2S_DOUT=12
    -D AUDIO_PA_CTRL=7
    ; --- Touch (CST816 on I2C, shared bus with ES8311) ---
    -D USE_CST816=1
    -D CST816_SDA=42
    -D CST816_SCL=41
    -D CST816_RST=47
    -D CST816_IRQ=48

; =============================================================================
;  Guition JC3248W535 - 3.5" 320x480 IPS (AXS15231B QSPI + I2C touch)
;  https://www.guition.com/ — ESP32-S3-N16R8, 16MB flash / 8MB PSRAM.
;  Display driver is implemented locally (src/lgfx_panel_axs15231b.hpp) since
;  mainline LovyanGFX does not ship Panel_AXS15231B.
;
;  Touch RST/INT pins are not wired on the shipped Guition boards inspected —
;  the touch IC shares reset with the display and is polled (no INT). If your
;  board revision exposes these pins, add AXS_TOUCH_RST / AXS_TOUCH_IRQ here.
; =============================================================================
[env:jc3248w535]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_16mb.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.f_flash = 80000000L
board_build.flash_mode = qio
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"jc3248w535\"
    -D BOARD_IS_JC3248W535=1
    -D ENABLE_OTA_AUTO=1
    -D BOARD_HAS_PSRAM=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Display (AXS15231B QSPI, 320x480 portrait native) ---
    -D DISPLAY_320x480=1
    -D AXS_QSPI_HOST=1            ; SPI2_HOST
    -D AXS_QSPI_FREQ=32000000    ; Arduino_GFX caps AXS15231B at 32 MHz
    -D AXS_QSPI_CS=45
    -D AXS_QSPI_SCK=47
    -D AXS_QSPI_D0=21
    -D AXS_QSPI_D1=48
    -D AXS_QSPI_D2=40
    -D AXS_QSPI_D3=39
    -D BACKLIGHT_PIN=1
    ; --- Touch (AXS15231B touch controller on I2C @0x3B) ---
    -D USE_AXS_TOUCH=1
    -D AXS_TOUCH_SDA=4
    -D AXS_TOUCH_SCL=8
    ; TEMP: bypass WiFi/MQTT/splash — only run display init + one rect then halt.
    -D AXS_MINIMAL_TEST=1

; =============================================================================
;  jc3248w535_skel — standalone test binary using the axs15231b-lovyangfx
;  skill's skeleton verbatim. No BambuHelper code. Used to isolate whether
;  the issue is in BambuHelper's integration or at the driver/hw level.
; =============================================================================
[env:jc3248w535_skel]
extends = env:jc3248w535
build_src_filter = -<*> +<skeleton_test.cpp>
lib_deps =
    ${common.lib_deps}
    moononournation/GFX Library for Arduino@~1.5.0
build_flags =
    -D BOARD_VARIANT=\"jc3248w535_skel\"
    -D BOARD_IS_JC3248W535_SKEL=1
    -D BOARD_HAS_PSRAM=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; Force Arduino_GFX QSPI chunk size to one row (320 px) to test if the
    ; 2nd-quarter noise band is chunk-boundary-related.
    -D ESP32QSPI_MAX_PIXELS_AT_ONCE=320

; =============================================================================
;  jc3248w535_vendor — baseline diagnostic. Compiles the MANUFACTURER'S
;  ESP-IDF AXS15231B panel driver verbatim (src/vendor/esp_lcd_axs15231b.*),
;  wired up via a minimal Arduino sketch that calls esp_lcd_new_panel_io_spi +
;  esp_lcd_new_panel_axs15231b + esp_lcd_panel_draw_bitmap directly. If this
;  binary paints RED/GREEN/BLUE/WHITE/BLACK then we have proof the toolchain
;  works and the vendor driver is correct on our hardware — our custom
;  LovyanGFX Bus_QSPI can then be deleted in favour of wrapping this.
;
;  REQUIRES: the vendor-shipped esp32s3 framework libs have been swapped into
;  ~/.platformio/packages/framework-arduinoespressif32/tools/sdk/esp32s3 so
;  that esp_lcd_panel_io_spi_config_t::flags.quad_mode is defined. Done
;  manually earlier in the development session.
; =============================================================================
[env:jc3248w535_vendor]
; Compiles the vendor ESP-IDF AXS15231B panel driver verbatim, wired up via a
; CUSTOM esp_lcd_panel_io_t shim (src/vendor/my_panel_io.c) that implements the
; QSPI framing ourselves — so we don't depend on stock arduino-esp32 having the
; quad_mode flag in esp_lcd_panel_io_spi_config_t (it doesn't in 3.0.17).
;
; This isolates "vendor setWindow + RAMWR/RAMWRC sequencing" from "our wire
; framing": the vendor panel driver handles init-table walking, CASET, RAMWR
; dispatch; our shim handles the actual SPI transactions. If this paints, our
; wire framing is fine and the previous bug was in our setWindow/draw logic.
extends = env:jc3248w535
build_src_filter = -<*> +<main_vendor.cpp> +<vendor/esp_lcd_axs15231b.c> +<vendor/my_panel_io.c>
build_flags =
    -D BOARD_VARIANT=\"jc3248w535_vendor\"
    -D BOARD_IS_JC3248W535_VENDOR=1
    -D BOARD_HAS_PSRAM=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; =============================================================================
;  ESP32-C3 Super Mini + ST7789 240x240
; =============================================================================
[env:esp32c3]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32c3\"
    -D BOARD_IS_C3=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=5
    ; --- USB Serial (C3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_LOW_RAM=1
