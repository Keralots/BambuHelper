; =============================================================================
;  QD electronic 2.8" IPS ESP32-S3 (ILI9341V 240x320 + FT6336 touch)
;  Module codes ES3C28P / ES3N28P (one spec covers both). Issue #125.
;  Community / untested - I do not own this board. Pin map taken from the
;  official vendor demo package (Arduino spi_dev.h / touch.h /
;  ESP_Panel_Board_Custom.h) and the ESP-IDF sdkconfig.
;
;  Core: ESP32-S3 N16R8 (16MB flash / 8MB OCTAL PSRAM @80MHz - from the IDF
;  sdkconfig: ESPTOOLPY_FLASHSIZE_16MB + SPIRAM_MODE_OCT). Same memory profile
;  as jc3248w535 / ws_lcd_350, so this is a STANDALONE env (it does NOT extend
;  s3_common, whose 4MB / qio_qspi profile is wrong for an octal-PSRAM R8 module).
;
;  Display: ILI9341V over plain 4-wire SPI -> native LovyanGFX Panel_ILI9341.
;    CS=10 DC=46 RST=-1 (power-on reset only) BL=45 MOSI=11 SCLK=12 MISO=13.
;    IPS panel: the vendor init sends 0x21 (INVON) + MADCTL 0x08 (BGR), so the
;    LGFX class uses invert=true / rgb_order=false (see src/lgfx_boards.h).
;
;  Touch: FT6336 (FocalTech, I2C @0x38) on its own I2C bus (SDA=16 SCL=15),
;    with INT=17 / RST=18. Reuses the FocalTech touch path in button.cpp; RST
;    is pulsed there (the vendor demo resets the controller on GPIO18).
;
;  Battery: cell sensed via a /2 divider on GPIO9 (ADC1_CH8). Divider 2.0x is
;    taken from the vendor demo's "vol * 2"; UNVERIFIED until calibrated on hw.
;
;  Audio (ES8311 codec) is present (AP_ENABLE=1 MCK=4 BCK=5 DIN=6 WS=7 DOUT=8,
;    codec on the touch I2C bus 15/16) but DEFERRED - buzzer disabled for now.
;
;  Layout: 240x320 - shared with cyd/ws_lcd_200 etc. (DISPLAY_240x320).
;
;  NOTE: the two pin-map *comments* in the vendor Arduino demos (GPIO34 ADC,
;  DC=2, BL=27) are stale ESP32-classic boilerplate and do NOT apply - the
;  authoritative pins are the #defines above.
; =============================================================================
[env:es3n28p]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_16mb.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.f_flash = 80000000L
board_build.flash_mode = qio
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"es3n28p\"
    -D BOARD_NAME=\"QD_ESP32-S3_2.8_ES3N28P\"
    -D BOARD_PANEL=\"ILI9341V_240x320_FT6336\"
    -D BOARD_IS_ES3N28P=1
    -D ENABLE_OTA_AUTO=1
    -D BOARD_HAS_PSRAM=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Layout profile (same 240x320 as CYD / ws_lcd_200) ---
    -D DISPLAY_240x320=1
    -D BACKLIGHT_PIN=45
    ; --- Display (ILI9341V 4-wire SPI) ---
    ; SPI pins (SCLK=12 MOSI=11 MISO=13 DC=46 CS=10, RST=-1) and invert/BGR are
    ; set in the LGFX_ES3N28P class in src/lgfx_boards.h.
    ; --- Touch (FT6336, FocalTech family - reuses the FT5X06 register path) ---
    -D USE_FT6336=1
    -D FT6336_SDA=16
    -D FT6336_SCL=15
    -D FT6336_RST=18
    ; --- Battery sense (ADC1_CH8 = GPIO9, /2 divider; ratio unverified) ---
    -D BOARD_HAS_BATTERY=1
    -D BOARD_HAS_BAT_ADC=1
    -D BAT_ADC_PIN=9
    -D BAT_VOLT_DIVIDER=2.0f
