; =============================================================================
;  Panlee WT32-SC01 Plus (3.5" ST7796 320x480 IPS, 8-bit parallel 8080 + FT6336)
;  https://www.smartpanel.cc/  /  issue #123
;  Community / EXPERIMENTAL - I do not own this board. NOT in the web flasher
;  yet; ships as an experimental build for the requester to verify first.
;
;  Pin map is dual-source confirmed (sukesh-ak LovyanGFX config + the official
;  Panlee "WT32-SC01 PLUS Datasheet" Tab.5 LCD Interface), but the panel has
;  not been brought up on hardware here - colors (invert), rotation, touch and
;  PSRAM init still need a real-device check.
;
;  Core: ESP32-S3 N16R2 (16MB flash / 2MB QSPI PSRAM). Unlike ws_lcd_350's R8
;  octal module, this is a STANDALONE env with memory_type = qio_qspi (2MB QSPI
;  PSRAM, NOT octal qio_opi).
;
;  Display: ST7796 over an 8-bit parallel (8080) bus -> lgfx::Bus_Parallel8.
;  This is the first parallel-bus board in the tree; the LGFX_SC01PLUS class in
;  src/lgfx_boards.h carries the pin map. LCD reset is a real GPIO (4), so no
;  IO-expander reset block is needed (unlike ws_lcd_350's TCA9554 pulse).
;
;  Touch: FT6336 (FocalTech, I2C @0x38) on SDA=6 / SCL=5. Reuses the FocalTech
;  path in button.cpp. TP_RST is multiplexed with LCD_RST on GPIO4.
;
;  Layout: 320x480 - shared verbatim with jc3248w535 / ws_lcd_350 (DISPLAY_320x480).
; =============================================================================
[env:wt32_sc01_plus]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_16mb.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.f_flash = 80000000L
board_build.flash_mode = qio
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"wt32_sc01_plus\"
    -D BOARD_NAME=\"Panlee_WT32-SC01_Plus\"
    -D BOARD_PANEL=\"ST7796_8bit_320x480_FT6336\"
    -D BOARD_IS_SC01PLUS=1
    -D ENABLE_OTA_AUTO=1
    -D BOARD_HAS_PSRAM=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Layout profile (same 320x480 as jc3248w535 / ws_lcd_350) ---
    -D DISPLAY_320x480=1
    -D BACKLIGHT_PIN=45
    ; --- Display (ST7796 8-bit 8080 parallel) ---
    ; Bus + panel pins (WR=47 RD=-1 RS/DC=0 D0..D7=9/46/3/8/18/17/16/15,
    ; CS hardwired, RST=4) live in the LGFX_SC01PLUS class in src/lgfx_boards.h.
    ; --- Touch (FT6336, FocalTech family - reuses the FT5X06 register path) ---
    -D USE_FT6336=1
    -D FT6336_SDA=6
    -D FT6336_SCL=5
