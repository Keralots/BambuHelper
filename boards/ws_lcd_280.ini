; =============================================================================
;  Waveshare ESP32-S3-Touch-LCD-2.8 (2.8" ST7789 240x320 + CST328 touch)
;  https://www.waveshare.com/wiki/ESP32-S3-Touch-LCD-2.8
;  Community / untested - I do not own this board. Pin map from Waveshare wiki.
;  Core per Waveshare wiki: 16MB flash + 8MB PSRAM (ESP32-S3 R8 = octal), same
;  memory profile as ws_lcd_154 where the identical config is hw-confirmed.
;  16MB partition table (was 4MB until v3.7.4) - fielded devices keep the old
;  4MB table (1.75MB OTA slots) until reflashed once via USB/web flasher;
;  OTA keeps working on the old table while firmware.bin fits the old slot.
; =============================================================================
[env:ws_lcd_280]
extends = s3_common
board = esp32-s3-devkitc-1
board_build.partitions = partitions_16mb.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
build_flags =
    ${s3_common.build_flags}
    -D BOARD_HAS_PSRAM=1
    -D BOARD_VARIANT=\"ws_lcd_280\"
    -D BOARD_NAME=\"Waveshare_ESP32-S3-Touch-LCD-2.8\"
    -D BOARD_PANEL=\"ST7789_240x320\"
    -D BOARD_IS_WS280=1
    -D BACKLIGHT_PIN=5
    ; --- Layout profile (same 240x320 as ws_lcd_200) ---
    -D DISPLAY_240x320=1
    ; --- Touch (CST328 on its own I2C bus, not shared with main I2C) ---
    -D USE_CST328=1
    -D CST328_SDA=1
    -D CST328_SCL=3
    -D CST328_RST=2
    -D CST328_IRQ=4
