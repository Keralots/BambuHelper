; =============================================================================
;  Waveshare ESP32-S3-Touch-LCD-3.5 (3.5" ST7796 320x480 IPS + FT6336 touch)
;  https://www.waveshare.com/wiki/ESP32-S3-Touch-LCD-3.5
;  Community / untested - I do not own this board. Pin map taken from the
;  official waveshareteam/ESP32-S3-Touch-LCD-3.5 Arduino demo
;  (examples 08_gfx_helloworld + 11_lvgl_arduino_v8).
;
;  Core: ESP32-S3R8 (16MB flash / 8MB octal PSRAM) - same memory profile as
;  jc3248w535, so this is a STANDALONE env (it does NOT extend s3_common,
;  whose 4MB / qio_qspi profile is wrong for an octal-PSRAM R8 module).
;
;  Display: ST7796 over plain 4-wire SPI -> native LovyanGFX Panel_ST7796,
;  no Arduino_GFX wrapper needed (unlike jc3248w535's AXS15231B QSPI). The
;  one catch: the LCD reset line is NOT on a GPIO - it hangs off a TCA9554
;  I2C IO expander (@0x20, expander P1). display_ui.cpp pulses it before
;  tft.init(); the panel is configured pin_rst=-1 / pin_cs=-1 (CS is
;  hardwired on the board - the demo uses LCD_CS=-1).
;
;  Touch: FT6336 (FocalTech, I2C @0x38) on the same I2C bus as the expander
;  (SDA=8, SCL=7). Reuses the FocalTech touch path in button.cpp.
;
;  Layout: 320x480 - shared verbatim with jc3248w535 (DISPLAY_320x480).
; =============================================================================
[env:ws_lcd_350]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_16mb.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.f_flash = 80000000L
board_build.flash_mode = qio
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"ws_lcd_350\"
    -D BOARD_NAME=\"Waveshare_ESP32-S3-Touch-LCD-3.5\"
    -D BOARD_PANEL=\"ST7796_320x480_FT6336\"
    -D BOARD_IS_WS350=1
    -D ENABLE_OTA_AUTO=1
    -D BOARD_HAS_PSRAM=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Layout profile (same 320x480 as jc3248w535) ---
    -D DISPLAY_320x480=1
    -D BACKLIGHT_PIN=6
    ; --- Display (ST7796 4-wire SPI) ---
    ; SPI pins (SCLK=5 MOSI=1 MISO=2 DC=3, CS hardwired) and the TCA9554
    ; reset wiring (I2C SDA=8/SCL=7, expander @0x20 P1) are set in the
    ; LGFX_WS350 class / initDisplay() in src/display_ui.cpp.
    ; --- Touch (FT6336, FocalTech family - reuses the FT5X06 register path) ---
    -D USE_FT6336=1
    -D FT6336_SDA=8
    -D FT6336_SCL=7
