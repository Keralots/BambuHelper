; =============================================================================
;  ESP32-S3 Super Mini + GC9A01 1.28" round 240x240 (bare 7-pin SPI module)
;  Wiring (same SPI map as the esp32s3 env, only the panel driver differs):
;    SCL=GPIO12  SDA(MOSI)=GPIO11  DC=GPIO9  CS=GPIO10  RES=GPIO8
;  7-pin modules have no BLK pin (backlight hardwired on), so no BACKLIGHT_PIN.
;  Standalone env (not extending s3_common) because s3_common injects
;  USE_ST7789_INVERT, which would double-invert the GC9A01 (cfg.invert is
;  already set in the panel class). No BOARD_LOW_RAM: supports 2 printers.
; =============================================================================
[env:esp32s3_round]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32s3_round\"
    -D BOARD_NAME=\"ESP32-S3_SuperMini_Round\"
    -D BOARD_PANEL=\"GC9A01_240x240_round\"
    ; BOARD_IS_S3 keeps the S3 defaults (buzzer GPIO5, LED deny-list); the
    ; ROUND define is checked first in lgfx_boards.h and swaps the panel.
    -D BOARD_IS_S3=1
    -D BOARD_IS_S3_ROUND=1
    -D DISPLAY_ROUND_240=1
    ; 7-pin module has no BLK pin; -1 = no backlight GPIO (all users guard >= 0)
    -D BACKLIGHT_PIN=-1
    -D ENABLE_OTA_AUTO=1
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
