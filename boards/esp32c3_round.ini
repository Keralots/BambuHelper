; =============================================================================
;  ESP32-C3 Super Mini + GC9A01 1.28" round 240x240 (bare 7-pin SPI module)
;  Wiring (same SPI map as the esp32c3 env, only the panel driver differs):
;    SCL=GPIO21  SDA(MOSI)=GPIO20  DC=GPIO7  CS=GPIO6  RES=GPIO10
;  7-pin modules have no BLK pin (backlight hardwired on), so no BACKLIGHT_PIN.
;  Experimental: first round display, uses the DISPLAY_ROUND_240 layout profile.
; =============================================================================
[env:esp32c3_round]
platform = espressif32@6.12.0
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32c3_round\"
    -D BOARD_NAME=\"ESP32-C3_SuperMini_Round\"
    -D BOARD_PANEL=\"GC9A01_240x240_round\"
    ; BOARD_IS_C3 keeps the C3 defaults (buzzer GPIO3, onboard LED); the
    ; ROUND define is checked first in lgfx_boards.h and swaps the panel.
    -D BOARD_IS_C3=1
    -D BOARD_IS_C3_ROUND=1
    -D DISPLAY_ROUND_240=1
    ; 7-pin module has no BLK pin; -1 = no backlight GPIO (all users guard >= 0)
    -D BACKLIGHT_PIN=-1
    -D ENABLE_OTA_AUTO=1
    ; --- USB Serial (C3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_LOW_RAM=1
