; =============================================================================
;  Panlee / Smartpanle SC05_X (ZX2D80CE02S / WT32S3-28S PRO)
;  2.8" ST7789 240x320 IPS, 8-bit parallel 8080 + FT5X06 touch
;  Community / EXPERIMENTAL - pin map from smartpanle/PanelLan_esp32_arduino.
;
;  This is NOT the 3.5" WT32-SC01 Plus (ZX3D50CE08S). The two boards both use
;  an ESP32-S3 and an 8080 LCD bus, but the panel, resolution, memory profile,
;  backlight, reset, touch pins, and data pins are different.
;
;  Core: ESP32-S3, 8MB flash / QSPI PSRAM per the vendor Arduino board table.
;  Display: ST7789 over 8-bit 8080 parallel, pins in src/lgfx_boards.h.
;  Touch: FT5X06-compatible controller on I2C SDA=8 / SCL=9, INT=48.
;  RS485: RTS=5 RXD=4 TXD=6 (reserved from user GPIO helpers for now).
; =============================================================================
[env:sc05_x]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_8mb_app0.csv
board_build.arduino.memory_type = dio_qspi
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.f_flash = 80000000L
board_build.flash_mode = dio
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"sc05_x\"
    -D BOARD_NAME=\"Panlee_SC05_X_ZX2D80CE02S\"
    -D BOARD_PANEL=\"ST7789_8bit_240x320_FT5X06\"
    -D BOARD_IS_SC05X=1
    -D ENABLE_OTA_AUTO=1
    -D BOARD_HAS_PSRAM=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Layout profile (same 240x320 as ws_lcd_200 / ws_lcd_280) ---
    -D DISPLAY_240x320=1
    -D BACKLIGHT_PIN=47
    ; --- Touch (FT5X06-compatible FocalTech controller) ---
    -D USE_FT5X06=1
    -D FT5X06_SDA=8
    -D FT5X06_SCL=9
    -D FT5X06_IRQ=48
